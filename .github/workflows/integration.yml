name: Integration Tests

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      test_path:
        description: Compatibility suite to run
        type: choice
        options: [tests/golden, tests/integration]
        default: tests/golden

permissions:
  contents: read

jobs:
  databricks-integration:
    runs-on: ubuntu-latest
    environment: databricks-integration
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install remote tooling
        run: python -m pip install ".[remote]"
      - name: Run Databricks compatibility tests
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
          DATABRICKS_CLUSTER_ID: ${{ secrets.DATABRICKS_CLUSTER_ID }}
          KIMBALL_TEST_CATALOG: ${{ vars.KIMBALL_TEST_CATALOG || 'spark_catalog' }}
        run: >-
          python tools/run_databricks_tests.py
          ${{ inputs.test_path || 'tests/golden' }}
