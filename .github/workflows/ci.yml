name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  lint-and-unit:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install ".[dev]"

      - name: Compile Python sources
        run: |
          python -m compileall src tests tools

      - name: Run Ruff linter
        run: ruff check src tests tools

      - name: Check Ruff formatting
        run: ruff format --check src tests tools

      - name: Run unit tests
        run: |
          pytest tests/unit -v \
            --ignore=tests/benchmarks \
            --ignore=tests/unit/test_performance.py \
            --junitxml=junit.xml \
            -o junit_family=legacy \
            --cov=src/kimball \
            --cov-branch \
            --cov-report=xml

      - name: Publish test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        continue-on-error: true
        with:
          files: junit.xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/test-results-action@v1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: junit.xml

      - name: Run performance benchmarks
        run: |
          if [ -f "tests/unit/test_performance.py" ]; then
            python -m pip install pytest-benchmark
            pytest tests/unit/test_performance.py -v --benchmark-only --benchmark-sort=mean --benchmark-columns=min,median,mean,max --benchmark-group-by=group
          else
            echo "No performance benchmarks defined yet"
          fi

      - name: Build package
        run: python -m build

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: kimball-framework-py${{ matrix.python-version }}-wheel
          path: dist/*.whl
          if-no-files-found: error

  validate-bundle:
    name: Validate Databricks Asset Bundle
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [dev, test]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Databricks CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh
          echo "/usr/local/bin" >> $GITHUB_PATH

      - name: Build wheel for bundle validation
        run: |
          python -m pip install --upgrade pip build
          python -m build --wheel --outdir dist

      - name: Validate bundle for ${{ matrix.target }}
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: |
          if [ -z "$DATABRICKS_HOST" ] || [ -z "$DATABRICKS_TOKEN" ]; then
            echo "Skipping ${{ matrix.target }} bundle validation: secrets not configured"
            exit 0
          fi
          databricks bundle validate --target ${{ matrix.target }}
