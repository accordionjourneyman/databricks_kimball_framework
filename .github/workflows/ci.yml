name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  lint-and-unit:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install ".[dev]"

      - name: Compile Python sources
        run: |
          python -m compileall src tests tools

      - name: Run Ruff linter
        run: ruff check src tests tools

      - name: Check Ruff formatting
        run: ruff format --check src tests tools

      - name: Type-check control plane with mypy
        run: mypy src/kimball/common src/kimball/contracts src/kimball/planning src/kimball/cli.py

      - name: Type-check package with Pyright
        run: pyright src/kimball

      - name: Run unit tests
        run: |
          pytest tests/unit -v \
            --ignore=tests/benchmarks \
            --ignore=tests/unit/test_performance.py \
            --junitxml=junit.xml \
            -o junit_family=legacy \
            --cov=src/kimball \
            --cov-branch \
            --cov-fail-under=70 \
            --cov-report=xml

      - name: Publish test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        continue-on-error: true
        with:
          files: junit.xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          files: coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/test-results-action@v1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: junit.xml

      - name: Build package
        run: python -m build

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v7
        with:
          name: kimball-framework-py${{ matrix.python-version }}-wheel
          path: dist/*.whl
          if-no-files-found: error

  validate-bundle:
    name: Validate Databricks Asset Bundle
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [dev, test]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Databricks CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh
          echo "/usr/local/bin" >> $GITHUB_PATH

      - name: Build wheel for bundle validation
        run: |
          python -m pip install --upgrade pip build
          python -m build --wheel --outdir dist

      - name: Validate bundle for ${{ matrix.target }}
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
          BUNDLE_VAR_workspace_host: ${{ secrets.DATABRICKS_HOST }}
        run: |
          if [ -z "$DATABRICKS_HOST" ] || [ -z "$DATABRICKS_TOKEN" ]; then
            echo "Skipping ${{ matrix.target }} bundle validation: secrets not configured"
            exit 0
          fi
          databricks bundle validate --target ${{ matrix.target }}

  integration:
    name: Integration tests (real Spark + Delta, Docker)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Build Docker test image
        run: docker compose build kimball-tests

      - name: Run integration tests against real Spark + Delta
        # Run the real-Spark integration suite on the project's Docker image
        # (pyspark 4.0.1 + delta-spark 4.2.0, Java 17). databricks-sdk is baked
        # into the image so tests/conftest.py imports cleanly. JUnit results are
        # written to a bind-mounted host dir so they survive the --rm container.
        run: |
          mkdir -p test-results
          docker compose run --rm --no-deps \
            -v "${PWD}/test-results:/test-results" \
            -e KIMBALL_TARGET=local \
            -e KIMBALL_ETL_SCHEMA=etl_control \
            kimball-tests \
            bash -c "python -m pytest tests/integration/ -v --tb=short --junitxml=/test-results/junit-integration.xml -o junit_family=legacy"

      - name: Publish integration test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        continue-on-error: true
        with:
          check_name: Integration test results
          files: test-results/junit-integration.xml

      - name: Upload integration test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: integration-test-results
          path: test-results/junit-integration.xml
          if-no-files-found: warn
