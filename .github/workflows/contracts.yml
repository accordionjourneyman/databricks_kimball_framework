name: Data contract governance

on:
  pull_request:
    branches: [main, master]
    paths:
      - "contracts/**"
      - "examples/configs/**"
      - "src/kimball/contracts/**"
      - "tools/check_contract_changes.py"
      - ".github/workflows/contracts.yml"
  push:
    branches: [main, master]
    paths:
      - "contracts/**"
      - "examples/configs/**"
      - "src/kimball/contracts/**"
      - "tools/check_contract_changes.py"

permissions:
  contents: read

jobs:
  producer-consumer-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository and base history
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install framework and test runtime
        run: python -m pip install ".[dev]"

      - name: Materialize base contracts
        shell: bash
        env:
          BASE_REF: ${{ github.event_name == 'pull_request' && format('origin/{0}', github.base_ref) || 'HEAD^' }}
        run: |
          mkdir -p /tmp/kimball-base
          if git cat-file -e "${BASE_REF}:contracts" 2>/dev/null; then
            git archive "${BASE_REF}" contracts | tar -x -C /tmp/kimball-base
          else
            mkdir -p /tmp/kimball-base/contracts
          fi

      - name: Validate producer evolution and consumer pins
        run: |
          python tools/check_contract_changes.py \
            --previous /tmp/kimball-base/contracts \
            --current contracts \
            --config examples/configs \
            --target prod
