name: Benchmark History

on:
  push:
    branches: [main, master]
    paths:
      - "src/**"
      - "tests/benchmarks/**"
      - "tools/benchmark_data.py"
      - "tools/benchmark_metrics.py"
      - "tools/benchmark_runner.py"
      - "tools/benchmark_analyzer.py"
      - "tools/benchmarks/**"
      - ".github/workflows/benchmarks.yml"
      - ".github/workflows/benchmark-history.yml"
  workflow_dispatch:

permissions:
  contents: write

env:
  JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
  SPARK_VERSION: "4.0.1"
  DELTA_VERSION: "4.2.0"

jobs:
  benchmark-history:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Java 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-benchmark-history-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-benchmark-history-

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install "pyspark==${{ env.SPARK_VERSION }}" "delta-spark==${{ env.DELTA_VERSION }}" pyyaml jinja2 pydantic pytest

      - name: Download Delta Lake JARs
        run: |
          SPARK_JARS_DIR=$(python -c "import pyspark, os; print(os.path.join(os.path.dirname(pyspark.__file__), 'jars'))")
          curl -fsSL -o "$SPARK_JARS_DIR/delta-spark_4.0_2.13-${{ env.DELTA_VERSION }}.jar" \
            "https://repo1.maven.org/maven2/io/delta/delta-spark_4.0_2.13/${{ env.DELTA_VERSION }}/delta-spark_4.0_2.13-${{ env.DELTA_VERSION }}.jar"
          curl -fsSL -o "$SPARK_JARS_DIR/delta-storage-${{ env.DELTA_VERSION }}.jar" \
            "https://repo1.maven.org/maven2/io/delta/delta-storage/${{ env.DELTA_VERSION }}/delta-storage-${{ env.DELTA_VERSION }}.jar"

      - name: Run benchmarks at tiny scale
        run: |
          export KIMBALL_ETL_SCHEMA=etl_control
          export PYSPARK_PYTHON=python3
          export PYSPARK_DRIVER_PYTHON=python3
          mkdir -p tools/benchmarks/results
          python -m pytest tests/benchmarks/ -v -s --scale tiny -x

      - name: Collect and timestamp results
        run: |
          mkdir -p benchmark-snapshot
          COMMIT_SHA=$(git rev-parse --short HEAD)
          COMMIT_TS=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          RESULT_COUNT=0
          if [ -d "tools/benchmarks/results" ]; then
            for f in tools/benchmarks/results/*_tiny.json; do
              if [ -f "$f" ]; then
                NAME=$(basename "$f" .json)
                cp "$f" "benchmark-snapshot/${NAME}_${COMMIT_SHA}.json"
                RESULT_COUNT=$((RESULT_COUNT + 1))
              fi
            done
          fi
          echo "commit_sha=$COMMIT_SHA" >> $GITHUB_ENV
          echo "Collected $RESULT_COUNT benchmark result files"
          if [ "$RESULT_COUNT" -eq 0 ]; then
            echo "::warning::No benchmark results were produced. Check the benchmark step for errors."
          fi

      - name: Push to benchmark-history branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          MONTH_DIR="history/$(date +%Y-%m)"
          mkdir -p "$MONTH_DIR"
          cp benchmark-snapshot/*.json "$MONTH_DIR/" 2>/dev/null || true

          # Try to fetch the existing benchmark-history branch.
          # If it doesn't exist yet, create it as an orphan branch.
          if git fetch origin benchmark-history 2>/dev/null; then
            # Branch exists — checkout it, then add new results on top.
            git checkout benchmark-history
          else
            # First run: create an orphan branch with no history.
            echo "benchmark-history branch does not exist yet. Creating it."
            git checkout --orphan benchmark-history
            git rm -rf . 2>/dev/null || true
            git commit --allow-empty -m "initialize benchmark-history branch"
          fi

          git add history/
          if git diff --cached --quiet; then
            echo "No new results to commit"
          else
            git commit -m "benchmark-history: $(date -u +'%Y-%m-%d %H:%M:%S UTC') commit=${{ env.commit_sha }}"
            # Retry push up to 3 times to handle concurrent workflow races.
            for attempt in 1 2 3; do
              if git push origin benchmark-history; then
                echo "Push succeeded on attempt $attempt"
                break
              else
                echo "Push attempt $attempt failed, rebasing and retrying..."
                git fetch origin benchmark-history
                git rebase origin/benchmark-history
              fi
            done
          fi