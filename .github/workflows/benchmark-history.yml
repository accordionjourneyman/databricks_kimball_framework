name: Benchmark History

on:
  push:
    branches: [main, master]
    paths:
      - "src/**"
      - "tests/benchmarks/**"
      - "tools/benchmark_data.py"
      - "tools/benchmark_metrics.py"
      - "tools/benchmark_runner.py"
      - "tools/benchmark_analyzer.py"
      - "tools/benchmarks/**"
      - ".github/workflows/benchmarks.yml"
      - ".github/workflows/benchmark-history.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  benchmark-history:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Java 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-benchmark-history-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-benchmark-history-

      - name: Cache Delta JARs
        id: cache-delta-jars
        uses: actions/cache@v4
        with:
          path: ~/.cache/delta-jars
          key: ${{ runner.os }}-delta-jars-3.5.5-3.2.0

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install "pyspark==3.5.5" "delta-spark==3.2.0" pyyaml jinja2 pydantic pytest

      - name: Download Delta JARs
        if: steps.cache-delta-jars.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/.cache/delta-jars
          SPARK_JARS_DIR=$(python -c "import pyspark, os; print(os.path.join(os.path.dirname(pyspark.__file__), 'jars'))")
          curl -fsSL -o "$SPARK_JARS_DIR/delta-spark_2.12-3.2.0.jar" \
            "https://repo1.maven.org/maven2/io/delta/delta-spark_2.12/3.2.0/delta-spark_2.12-3.2.0.jar"
          curl -fsSL -o "$SPARK_JARS_DIR/delta-storage-3.2.0.jar" \
            "https://repo1.maven.org/maven2/io/delta/delta-storage/3.2.0/delta-storage-3.2.0.jar"

      - name: Run benchmarks at tiny scale
        run: |
          export KIMBALL_ETL_SCHEMA=etl_control
          export PYSPARK_PYTHON=python3
          export PYSPARK_DRIVER_PYTHON=python3
          mkdir -p tools/benchmarks/results
          python -m pytest tests/benchmarks/ -v -s --scale tiny -x

      - name: Collect and timestamp results
        run: |
          mkdir -p benchmark-snapshot
          COMMIT_SHA=$(git rev-parse --short HEAD)
          COMMIT_TS=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          if [ -d "tools/benchmarks/results" ]; then
            for f in tools/benchmarks/results/*_tiny.json; do
              if [ -f "$f" ]; then
                NAME=$(basename "$f" .json)
                cp "$f" "benchmark-snapshot/${NAME}_${COMMIT_SHA}.json"
              fi
            done
          fi
          echo "commit_sha=$COMMIT_SHA" >> $GITHUB_ENV
          echo "Stored results in benchmark-snapshot/"

      - name: Push to benchmark-history branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          MONTH_DIR="history/$(date +%Y-%m)"
          mkdir -p "$MONTH_DIR"
          cp benchmark-snapshot/*.json "$MONTH_DIR/" 2>/dev/null || true
          git add history/
          if git diff --cached --quiet; then
            echo "No new results to commit"
          else
            git commit -m "benchmark-history: $(date -u +'%Y-%m-%d %H:%M:%S UTC') commit=${{ env.commit_sha }}"
            git push origin HEAD:refs/heads/benchmark-history
          fi
