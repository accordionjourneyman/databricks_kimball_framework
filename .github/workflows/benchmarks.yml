name: Benchmarks

on:
  pull_request:
    branches: [main, master]
    paths:
      - "src/**"
      - "tests/benchmarks/**"
      - "tests/unit/test_performance.py"
      - "tools/benchmark_*.py"
      - ".github/workflows/benchmarks.yml"
  push:
    branches: [main, master]
    paths:
      - "src/**"
      - "tests/benchmarks/**"
      - "tests/unit/test_performance.py"
      - "tools/benchmark_*.py"
      - ".github/workflows/benchmarks.yml"
  workflow_dispatch:
    inputs:
      scale:
        description: Spark benchmark scale
        type: choice
        options: [tiny, small, medium]
        default: tiny

permissions:
  contents: read

env:
  JAVA_VERSION: "17"
  SPARK_VERSION: "4.0.1"
  DELTA_VERSION: "4.2.0"
  BENCHER_API_KEY: ${{ secrets.BENCHER_API_KEY }}
  BENCHER_PROJECT: ${{ vars.BENCHER_PROJECT || 'kimball-framework' }}

jobs:
  micro:
    name: Microbenchmarks (advisory)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Install benchmark dependencies
        run: python -m pip install -e ".[dev]"
      - name: Install Bencher CLI for protected-branch publication
        if: github.event_name == 'push' && env.BENCHER_API_KEY != ''
        uses: bencherdev/bencher@main
      - name: Run microbenchmarks
        run: |
          publish_args=()
          if [[ "$GITHUB_EVENT_NAME" == "push" && -n "$BENCHER_API_KEY" ]]; then
            publish_args+=(--publish)
          fi
          python tools/benchmark_runner.py \
            --suite micro \
            --testbed github-ubuntu-python \
            "${publish_args[@]}"
      - name: Add summary
        if: always()
        run: find benchmark-results -name summary.md -exec cat {} \; >> "$GITHUB_STEP_SUMMARY"
      - name: Upload immutable results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: microbenchmarks-${{ github.sha }}
          path: benchmark-results/
          retention-days: 30
          if-no-files-found: error

  spark-smoke:
    name: Spark/Delta benchmark correctness
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Install benchmark dependencies
        run: |
          python -m pip install -e ".[dev]"
          python -m pip install "pyspark==${SPARK_VERSION}" "delta-spark==${DELTA_VERSION}"
      - name: Run one-round Spark correctness benchmarks
        env:
          KIMBALL_BENCHMARK_ROUNDS: "1"
          KIMBALL_BENCHMARK_WARMUPS: "0"
          KIMBALL_BENCHMARK_TESTBED: github-ubuntu-spark
          KIMBALL_BENCHMARK_IMAGE: github-ubuntu-spark-4.0.1-delta-4.2.0
        run: >-
          python tools/benchmark_runner.py
          --suite spark
          --scale ${{ inputs.scale || 'tiny' }}
      - name: Add summary
        if: always()
        run: find benchmark-results -name summary.md -exec cat {} \; >> "$GITHUB_STEP_SUMMARY"
      - name: Upload immutable results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: spark-benchmarks-${{ github.sha }}
          path: benchmark-results/
          retention-days: 90
          if-no-files-found: error
