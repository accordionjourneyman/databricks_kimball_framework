table_name: {{ catalog }}.{{ out_schema }}.fact_events
table_type: fact
merge_keys: [event_id]
append_only: true

sources:
  - name: {{ catalog }}.{{ raw_schema }}.events
    alias: e
    cdc_strategy: append
    starting_version: 0
    primary_keys: [event_id]

transformation_sql: |
  SELECT
    e.event_id,
    e.event_type,
    e.event_time,
    e.payload
  FROM e

audit_columns: true
