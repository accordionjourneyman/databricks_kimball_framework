table_name: {{ catalog }}.{{ out_schema }}.dim_customer
table_type: dimension
scd_type: 2
keys:
  surrogate_key: customer_sk
  natural_keys: [customer_id]
effective_at: updated_at
track_history_columns:
  - first_name
  - last_name
  - email
  - address
sources:
  - name: {{ catalog }}.{{ raw_schema }}.customers
    alias: c
    cdc_strategy: cdf
    starting_version: 0
    primary_keys: [customer_id]
transformation_sql: |
  SELECT
    customer_id,
    first_name,
    last_name,
    email,
    address,
    updated_at,
    _change_type
  FROM c
audit_columns: true
preserve_all_changes: true
pii:
  columns:
    - column: email
      strategy: hash
    - column: address
      strategy: mask
      reveal_prefix: 5
