table_name: {{ catalog }}.{{ out_schema }}.fact_sales
table_type: fact
merge_keys: [order_item_id]
depends_on:
  - {{ catalog }}.{{ out_schema }}.dim_customer
  - {{ catalog }}.{{ out_schema }}.dim_product

foreign_keys:
  - column: customer_sk
    references: {{ catalog }}.{{ out_schema }}.dim_customer
    dimension_key: customer_sk
    relationship: type7
    durable_column: customer_dk
    durable_dimension_key: customer_dk
    lookup:
      source_columns: [customer_id]
      event_time: order_date
      early_arriving: skeleton
  - column: product_sk
    references: {{ catalog }}.{{ out_schema }}.dim_product
    dimension_key: product_sk
    lookup:
      source_columns: [product_id]
      early_arriving: default

sources:
  - name: {{ catalog }}.{{ raw_schema }}.order_items
    alias: oi
    cdc_strategy: cdf
    starting_version: 0
    primary_keys: [order_item_id]
  - name: {{ catalog }}.{{ raw_schema }}.orders
    alias: o
    cdc_strategy: cdf
    starting_version: 0
    primary_keys: [order_id]
  - name: {{ catalog }}.{{ out_schema }}.dim_product
    alias: p
    cdc_strategy: full

transformation_sql: |
  SELECT
    oi.order_item_id,
    o.order_id,
    o.customer_id,
    oi.product_id,
    p.product_sk,
    o.order_date,
    oi.quantity,
    oi.sales_amount,
    (oi.sales_amount - (p.unit_cost * oi.quantity)) AS net_profit,
    oi._change_type
  FROM oi
  JOIN o ON oi.order_id = o.order_id
  LEFT JOIN p ON oi.product_id = p.product_id

audit_columns: true
