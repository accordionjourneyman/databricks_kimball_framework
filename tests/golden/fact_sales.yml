table_name: {{ catalog }}.{{ out_schema }}.fact_sales
table_type: fact
merge_keys: [order_item_id]

foreign_keys:
  - column: customer_sk
    references: {{ catalog }}.{{ out_schema }}.dim_customer
    dimension_key: customer_sk
    default_value: -1
  - column: product_sk
    references: {{ catalog }}.{{ out_schema }}.dim_product
    dimension_key: product_sk
    default_value: -1

sources:
  - name: {{ catalog }}.{{ raw_schema }}.order_items
    alias: oi
    cdc_strategy: cdf
    starting_version: 0
    primary_keys: [order_item_id]
  - name: {{ catalog }}.{{ raw_schema }}.orders
    alias: o
    cdc_strategy: cdf
    starting_version: 0
    primary_keys: [order_id]
  - name: {{ catalog }}.{{ out_schema }}.dim_customer
    alias: c
    cdc_strategy: full
  - name: {{ catalog }}.{{ out_schema }}.dim_product
    alias: p
    cdc_strategy: full

transformation_sql: |
  SELECT
    oi.order_item_id,
    o.order_id,
    c.customer_sk,
    p.product_sk,
    o.order_date,
    oi.quantity,
    oi.sales_amount,
    (oi.sales_amount - (p.unit_cost * oi.quantity)) AS net_profit,
    oi._change_type
  FROM oi
  JOIN o ON oi.order_id = o.order_id
  LEFT JOIN c ON o.customer_id = c.customer_id
             AND CAST(o.order_date AS DATE) >= CAST(c.__valid_from AS DATE)
             AND (c.__valid_to IS NULL OR CAST(o.order_date AS DATE) < CAST(c.__valid_to AS DATE))
  LEFT JOIN p ON oi.product_id = p.product_id

audit_columns: true
early_arriving_facts:
  - dimension_table: {{ catalog }}.{{ out_schema }}.dim_customer
    fact_join_key: customer_id
    dimension_join_key: customer_id
    surrogate_key_col: customer_sk
    surrogate_key_strategy: identity
