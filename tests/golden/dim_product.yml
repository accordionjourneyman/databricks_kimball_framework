table_name: {{ catalog }}.kimball_golden.dim_product
table_type: dimension
scd_type: 1
keys:
  surrogate_key: product_sk
  natural_keys: [product_id]
surrogate_key_strategy: identity
sources:
  - name: {{ catalog }}.kimball_golden_raw.products
    alias: p
    cdc_strategy: full
transformation_sql: |
  SELECT
    product_id,
    name,
    category,
    unit_cost,
    updated_at
  FROM p
audit_columns: true
