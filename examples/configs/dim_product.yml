table_name: {{ target.gold_schema }}.dim_product
table_type: dimension
scd_type: 1
keys:
  surrogate_key: product_sk
  natural_keys: [product_id]

sources:
  - name: {{ target.silver_schema }}.products
    alias: p
    cdc_strategy: cdf
    primary_keys: [product_id]  # Required for CDF deduplication

transformation_sql: |
  SELECT
    p.product_id,
    p.name,
    p.category,
    p.unit_cost,
    p.updated_at,
    p._change_type  -- Required for CDF delete detection
  FROM p

audit_columns: true
