table_name: {{ target.gold_schema }}.dim_customer
table_type: dimension
scd_type: 2
keys:
  surrogate_key: customer_sk
  natural_keys: [customer_id]

# New configuration for surrogate key strategy
# SCD2 requires identity strategy; hash violates Kimball principles for versioned dimensions

# Columns that trigger a new SCD2 version when changed
track_history_columns: 
  - first_name
  - last_name
  - email
  - address

# Required business-time SCD2 boundary. Replays use this source timestamp rather
# than processing time, so the same input produces the same history chain.
effective_at: updated_at

# Default rows to seed into the dimension
default_rows:
  "-1": "Unknown"
  "-2": "N/A"

# Liquid Clustering for optimal query performance
cluster_by: [customer_id]
optimize_after_merge: true

sources:
  - name: {{ target.silver_schema }}.customers
    alias: c
    cdc_strategy: cdf
    primary_keys: [customer_id]  # Required for CDF deduplication
    # Exact producer contract pin. CI rejects incompatible version evolution;
    # runtime adapts the same ODCS object into schema/CDC/DQ checks.
    contract_ref: ../../contracts/customer-contract/1.0.0.odcs.yaml

observability:
  enabled: true
  event_table: etl_data_quality_events
  temporal_state_table: etl_contract_temporal_state
  write_failure: warn

table_description: Type 2 customer dimension governed by the CRM supplier contract.
column_descriptions:
  customer_sk: Warehouse surrogate key for a customer version.
  customer_id: Stable CRM customer identifier.
  updated_at: Supplier business-effective timestamp for this version.

transformation_sql: |
  SELECT
    c.customer_id,
    c.first_name,
    c.last_name,
    c.email,
    c.address,
    c.updated_at,
    c._change_type  -- Required for CDF delete detection
  FROM c

audit_columns: true
